# 构建期依赖缓存（运行时无需挂载）：
#   项目根 .build-cache/app/pnpm-store — docker build 时 local cache（见 Dockerfile、install_linux.sh）
services:
  app-service:
    image: app-service:latest
    container_name: app-service
    user: root

    ports:
      - "${APP_PORT:-9010}:80"

    volumes:
      - ${NGINX_CONF:-./conf/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./logs:/app/logs
      - ./conf/ssl:/etc/nginx/ssl:ro
      - /etc/localtime:/etc/localtime:ro

    environment:
      - TZ=Asia/Shanghai

    extra_hosts:
      - "gateway:host-gateway"
      - "system-host:host-gateway"
      - "video-host:host-gateway"
      - "ai-host:host-gateway"
      - "srs-host:host-gateway"
      - "zlm-host:host-gateway"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - easyaiot-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  easyaiot-network:
    name: easyaiot-network
    external: true
